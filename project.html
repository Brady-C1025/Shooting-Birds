            if (mainmenu_spritesheet.complete) {
                update();
            } else {

            }

            function UpdateDucks(){
                for (let duck of ducks){
                    if(duck.s != 2){// check if not dead
                        if(round_ended == false){
                            if(duck.x <= 0 && round_clock_status != 'ended'){ //turn around if at right edge of canvas
                                duck.d[0] = 0;
                            }else if(duck.x + duck_scale >= canvas.width  && round_clock_status != 'ended'){ //turn around at left edge
                                duck.d[0]= Math.PI;
                            }else if(duck.y + duck_scale >= canvas.height-150){ //turn around at bottom
                                duck.d[0]= 3 * Math.PI / 2;
                            }else if(duck.y <= 0  && round_clock_status != 'ended'){
                                duck.d[0]= Math.PI / 2;
                            }
                            
                            if(duck.y >= -80 && duck.x+duck_scale > 0 && duck.x < canvas.width){
                                duck.d = GetDuckDirection(duck.d, duck.y); //update duck location
                                duck.x += Math.cos(duck.d[0]) * (duck.v*dt);
                                duck.y += Math.sin(duck.d[0]) * (duck.v*dt);
                            }
                            }else{
                            if(duck.s != 2){
                                duck.y -= duck_fly_away_speed*dt;
                                duck.s = 3;
                            }
                            
                        }
                    }
                    if(duck.s != 2 && duck.y <= 260 && duck.y > 258){// make them chose a direction immediatly after leaving the grass
                        duck.d[1] = (duck.d[2]-.08)
                    }



                    if(duck.s == 2 && duck.f != 0 && duck.y < 300){ //when dead fall down
                        if(duck.sounds[0] == 0){//Play falling sound only once
                            duck.sounds[0] = 1;
                            duckfalling_audio.pause();
                            duckfalling_audio.currentTime = 0;
                            PlaySound('duck_falling')
                        }
                        duck.y += duck_fall_speed*dt;
                    }

                    if(duck.y >= 300 && duck.s == 2){
                        if(duck.sounds[1] == 0){//Play hit ground sound only once
                            duck.sounds[1] = 1;
                            deadducklands_audio.pause();
                            deadducklands_audio.currentTime = 0;
                            PlaySound('dead_duck_lands')
                            duckfalling_audio.pause();
                            duckfalling_audio.currentTime = 0;
                        }
                    }

                    duck.s = GetDuckState(duck.s,duck.d) //update duck state

                    if (duck.s == 2 && duck.ft < duck_animation_speed+.3){
                        duck.ft += dt;
                    }else{

                        if(duck_flap_ft >= duck_flap_sound_speed && duck.s != 2){
                            duckflap_audio.currentTime = 0;
                            PlaySound('duck_flap');
                            duck_flap_ft = 0;
                        }

                        if(duck.ft >= duck_animation_speed){ //update duck animation
                            
                            if(duck.s != 2 && duck.y <= 300 && duck.y > 0 && duck.x > 0 && duck.y <= (canvas.width-duck_scale)){//only quack when alive and on screen
                                PlaySound('duck_quack')
                            }

                            duck.ft = 0;
                            duck.f = GetDuckFrame(duck.s, duck.f);
                        }else{
                            duck.ft += dt;
                        }
                    }

                    var flipx = false
                    if(Math.cos(duck.d[0]) < 0){ //flips the duck depending on direction moving
                        flipx = true;
                    }else{
                        flipx = false;
                    }

                    DrawDuck( // draw the duck
                        duck.ss,
                        ((duck.f*40)+(duck.s*120)),0,
                        40,40,
                        duck.x, duck.y,
                        duck_scale,duck_scale,
                        flipx
                    );
                }
                duck_flap_ft += dt;
            }

            function GetDuckState(state,direction){ //sets the state of the duck, state used for sprite determination
                if(state == 2){
                    return 2;
                }else if(state == 3){
                    return 3;
                }else if(Math.abs(Math.cos(direction[0])) > Math.abs(Math.sin(direction[0]))){ //checks if its mainly moving horizontal
                    return 1;
                }else{
                    return 0;
                }
            }

            function GetDuckDirection(direction, y){ //sets a random direction
                let angle = 0;

                if(direction[1] > direction[2]){
                
                    if(round_clock_status == 'ended'){//if round ended favor going up
                        angle = Math.PI + Math.random() * Math.PI;
                        return [angle, 0, direction[2]];
                    }else if(y <= 130){//up in top half of screen go in any direction
                        angle = Math.random() * Math.PI * 2;
                        return [angle, 0, direction[2]];
                    }else if (y > 130){//if in bottom half cant go up
                        angle = Math.PI + Math.random() * Math.PI;
                        return [angle, 0, direction[2]];
                    }
                }else{
                    return [direction[0],direction[1]+=dt,direction[2]]
                }
            }

            function DrawDuck(img, sx, sy, sw, sh, dx, dy, dw, dh, flipX){ //original drawImage function but with the option to flip horizontally
            
                ctx.save();
            
                if(flipX){
                    ctx.translate(dx + dw, dy);
                    ctx.scale(-1,1);
                    ctx.drawImage(img, sx, sy, sw, sh, 0, 0, dw, dh);
                } else {
                    ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
                }
            
                ctx.restore();

            }

            function GetDuckFrame(state, frame){ //returns the sprite frame for the duck
                if(state == 0){//up/down
                    if(frame == 2){
                        return 0;
                    }else{
                        return frame + 1;
                    }
                }else if(state == 1){//sideways
                    if(frame == 2){
                        return 0;
                    }else{
                        return frame + 1;
                    }
                }else if(state == 2){//dead
                    if(frame == 2){
                        return 1;
                    }else{
                        return frame + 1;
                    }
                }else if(state == 3){//?
                    if(frame == 2){
                        return 0;
                    }else{
                        return frame + 1;
                    }
                }
            }

            function MainMenu(){
                if(played_intro_song == false){
                    played_intro_song = true;
                    PlaySound('title_song');
                }
                ctx.drawImage(mainmenu_spritesheet,0,0,256,224,0,0,canvas.width, canvas.height)

                ctx.drawImage(cursor_spritesheet,0,0,32,32,mouseX-(cursor_scale/2),mouseY-(cursor_scale/2),cursor_scale,cursor_scale)
            }

            }

            function DrawForeGround(){

            function DrawDog(num_of_ducks, pause_time){
                if(dog.d == 1){// dog up
                    dog.y -= dog.v*dt;
                    if(dog.y < dog.ymin){
                        dog.d = 0;
                    }
                }
                if(dog.d == 2){// dog down
                    if(dog.y < dog.ymax){
                        dog.y += dog.v*dt;
                        dog.d = 0;
                    }
                }
                if(dog.d == 0){// dog pause
                    dog.pt += dt
                    if(dog.pt > pause_time){
                        dog.d = 2;
                    }
                }
                if(dog.ft >= dog.fr){ //animate the dog
                    dog.ft = 0;
                    if(dog.f == 1){
                        dog.f = 0;
                    }else{
                        dog.f = 1;
                    }
                }else{
                    dog.ft += dt;
                }


                if(won_round == true && end_of_level == false){
                    PlaySound('got_a_duck')
                }else if(won_round == false && end_of_level == false){
                    PlaySound('dog_laugh')
                }

                if(won_round == true && perfect_level == false){//draw the sprite depending on win or lose round.
                    ctx.drawImage(dogwin_spritesheet,(num_of_ducks-1)*60,0,60,60,dog.x,dog.y,120,120)
                }else{
                    ctx.drawImage(dogwin_spritesheet,180+(60*dog.f),0,60,60,dog.x,dog.y,120,120)
                    ctx.drawImage(flyaway_spritesheet,0,0,73,17,265,100,120,30)
                }
                if(gameover == true){
                    PlaySound('game_over')
                    ctx.drawImage(gameover_spritesheet,0,0,49,33,265,85,120,80.81)
                }
                if(perfect_level == true){
                    ctx.drawImage(perfect_spritesheet,0,0,70,33,240,79.5,171.42,80.81)
                }
            }

            function DrawDogSniff(full_anim){
                if(full_anim == true){

                    if(dog_sniff.s == 0){  //Walk 1
                        if(dog_sniff.ft >= dog_sniff.fr){
                            dog_sniff.f += 1
                            dog_sniff.ft = 0;
                            dog_sniff.ac += 1;
                        }

                            dog_sniff.ac = 0;

                            dog_sniff.f += 1
                            dog_sniff.ft = 0;
                            dog_sniff.ac += 1;
                        }

                            dog_sniff.f = 0;

                    if(dog_sniff.s == 2){// Walk 2

                        }
                        if(dog_sniff.f == 4){

                        }

                        if(dog_sniff.ac >= 15){
                            dog_sniff.s = 1;
                            dog_sniff.ac = 0;
                            dog_sniff.f = 3;
                        }
                        dog_sniff.x += 45*dt
                    }
                    if(dog_sniff.s == 1){//Sniff 1
                        if(dog_sniff.ft >= dog_sniff.fr){
                            dog_sniff.f += 1
                            dog_sniff.ft = 0;
                            dog_sniff.ac += 1;
                        }
                        if(dog_sniff.f == 5){
                            dog_sniff.f = 3;
                        }

                        if(dog_sniff.ac >= 6){
                            dog_sniff.s = 2;
                            dog_sniff.ac = 0;
                            dog_sniff.f = 5;
                        }
                    }
                    if(dog_sniff.s == 2){//Jump
                        if(dog_sniff.bark_ft >= .25 && dog_sniff.bark_count < 3){
                            dog_sniff.bark_ft = 0;
                            dog_sniff.bark_count += 1;
                            dogbark_audio.pause();

            function DrawDuckCounter(ducks_shot, x, y){
                for (let duck in shot_duck_counter){
                    if (shot_duck_counter[duck] == 1){
                        ctx.drawImage(tallymark_spritesheet,7,0,7,7,x+(20*(duck-1)),y,17,16);
                    }
                }

                for(i = 0; i < 11; i++){
                    if((diffuculty == 1 && i == round_num) || (diffuculty == 2 && (i == round_num || i == round_num - 1))){
                        if (round_flash_s == true){
                                ctx.drawImage(tallymark_spritesheet,14,0,7,7,x+(20*(i-1)),y,17,16);
                            }
                        }
                }
                if(round_flash_ft >= .5){
                    round_flash_ft = 0;
                    round_flash_s = !round_flash_s;
                }
                round_flash_ft += dt;
            }

            function DrawDuckCounterCollapse(ducks_shot, x, y){
                
                if(shot_duck_collapse_finished == false){
                    for (let duck in shot_duck_counter){
                        shot_duck_collapse.push(shot_duck_counter[duck]);
                    }
                    shot_duck_collapse_finished = true;
                }
                if(shot_duck_animation_ft >= .3){
                    if (shot_duck_collapse.indexOf(0) != -1){
                        shot_duck_animation_ft = 0;
                        shot_duck_collapse.splice(shot_duck_collapse.indexOf(0),1);
                    }
                }else{
                    shot_duck_animation_ft += dt;
                }

                for(let i = 0; i < shot_duck_collapse.length; i++){
                    if(shot_duck_collapse[i] == 1){
                        ctx.drawImage(tallymark_spritesheet,7,0,7,7,x+(20*i),y,17,16)
                    }
                }
            }

            function RoundClock(){
                if(round_clock_status == 'waiting'){
                    round_clock_status = 'running';
                }
                if(round_clock_status == 'running'){
                    round_clock += dt;
                }
                if(round_clock >= 5){
                    round_clock_status = 'ended'
                    round_clock = 0;
                }
            }
            
            function NumberToShoot(level_number){
                if (level_number < 10) return 6;
                if (level_number >= 10 && level_number < 13) return 7;
                if (level_number >= 13 && level_number < 15) return 8;
                if (level_number >= 15 && level_number < 20) return 9;
                if (level_number >= 20) return 10;
            }

            function PlaySound(sound){
                switch (sound) {
                    case 'clear_round':
                        clearround_audio.play();
                        break;
                    case 'dog_bark':
                        dogbark_audio.play();
                        break;
                    case 'dog_laugh':
                        doglaugh_audio.play();
                        break;
                    case 'dog_show_ducks':
                        dogshowducks_audio.play();
                        break;
                    case 'duck_flap':
                        duckflap_audio.play();
                        break;
                    case 'gunshot':
                        gunshot_audio.currentTime = 0;
                        gunshot_audio.play();
                        break;
                    case 'intro_to_ducks':
                        introtoducks_audio.play();
                        break;
                    case 'perfect_round':
                        perfectround_audio.play();
                        break;
                    case 'title_song':
                        titlesong_audio.play();
                        break;
                    case 'you_failed':
                        youfailed_audio.play();
                        break;
                    case 'game_over':
                        gameover_audio.play();
                        break;
                    case 'got_a_duck':
                        gotaduck_audio.play();
                        break;
                    case 'duck_quack':
                        duckquack_audio.play();
                        break;
                    case 'duck_falling':
                        duckfalling_audio.play();
                        break;
                    case 'dead_duck_lands':
                        deadducklands_audio.play();
                        break;
                    case 'hit_duck':
                        hitduck_audio.pause();
                        hitduck_audio.currentTime = 0;
                        hitduck_audio.play();
                        break;
                    default:
                        break;
                }
            }

            function ResetRound(){
                if(round_num < 10){
                    round_ended = false;
                    ducks = [];
                    GenerateDucks(diffuculty);
                    shots = 0;
                    dog.pt = 0;
                    dog.y = 300;
                    dog.d = 1;
                    round_num += diffuculty;
                    gamestate = 1;
                    draw_points = [];
                    round_clock_status = 'waiting';
                    round_clock = 0;
                }else if(round_num >= 10){
                    EndLevel();
                }
            }

            function ResetLevel(){
                round_num = 0;
                end_of_level = false;
                perfect_level = false;
                level_num += 1;
                num_to_shoot = NumberToShoot(level_num);
                shot_duck_counter = {};
                shot_duck_collapse = [];
                shot_duck_collapse_finished = false;
                shot_duck_animation_ft = 0;
            }

            function Click(x,y){
                if(clicks == 0){
                    PlaySound('title_song')
                    clicks += 1;
                }else if (clicks == 1){
                    clicks += 1;
                }

                if(gamestate == 0 && clicks >= 2){
                    if(x >= 150 && x <= 480){
                        if(y >= 300 && y <=320){
                            titlesong_audio.pause()
                            titlesong_audio.currentTime = 0;
                            PlaySound('intro_to_ducks')
                            dog_sniff.x = dog_sniff.startx;
                            dog_sniff.y = dog_sniff.starty;
                            dog_sniff.f = 0;
                            dog_sniff.ac = 0;
                            dog_sniff.s = 0;
                            dog_sniff.ft = 0;
                            dog_sniff_anim = true;
                            gameover = false;
                            diffuculty = 1;
                            gamestate = 4;
                            played_intro_song = false;
                            setTimeout(() => {//Wait for dog sniff animation full
                                ResetLevel();
                                ResetRound();
                            }, 9000);
                        }else if(y >= 335 && y <= 355){
                            titlesong_audio.pause()
                            titlesong_audio.currentTime = 0;
                            PlaySound('intro_to_ducks')
                            dog_sniff.x = dog_sniff.startx;
                            dog_sniff.y = dog_sniff.starty;
                            dog_sniff.f = 0;
                            dog_sniff.ac = 0;
                            dog_sniff.s = 0;
                            dog_sniff.ft = 0;
                            dog_sniff_anim = true;
                            gameover = false;
                            diffuculty = 2;
                            gamestate = 4;
                            played_intro_song = false;
                            setTimeout(() => {//Wait for dog sniff animation full
                                ResetLevel();
                                ResetRound();
                            }, 9000);
                        }
                    }

                }else if(gamestate == 1 && shots < maxshots && round_ended == false){
                    PlaySound('gunshot')
                    show_gun_flash = true;
                    shots += 1;
                    for (let duck of ducks){
                        if((x > duck.x && x < (duck.x + duck_scale)) && (y > duck.y && y < (duck.y + duck_scale)) && duck.s != 2){
                            draw_points.push({type : duck.t, x : duck.x+20, y : duck.y+40, ft : 0})
                            if(duck.t == 0) points += 500;
                            if(duck.t == 1) points += 1000;
                            if(duck.t == 2) points += 1500;
                            PlaySound('hit_duck')
                            shot_duck_counter[Object.keys(shot_duck_counter).length+1] = 1;
                            duck.s = 2;
                            duck.f = 0;
                        }
                    }
                }
            }
            
            function GenerateDucks(n){
                for (let i = 0; i < n; i++) {
                    let type = WeightedRandom([0, 1, 2],[0.7, 0.2, 0.9]);

                    let interval =  Math.max(0.5, 1.2 * (1 - level_num * 0.05) * (1 - type * 0.2));

                    let speed = duckv + (level_num*10) + (type*10);

                    let y_random = (ducks.length === 0 ? 0 : 400);

                    let x_random = (ducks.length === 0 ? (Math.floor(Math.random() * 640) + 1) : (ducks[0].x >= (canvas.width / 2) ? (ducks[0].x - 200) : (ducks[0].x + 200))); 

                    ducks.push({x : x_random, y : duck_spawn_y + y_random, //x/y pos. of duck
                                v : speed, //velocity/speed
                                s : 0, f : 0, ft : ducks.length === 0 ? 0 : 0.04, //s is state, f is frame, ft is frametick
                                d : [3 * Math.PI / 2, duck_change_direction_interval, interval], //d is direction and time since last change)
                                ss : duck_spritesheets[type], //type of duck 0-Green, 1-Blue, 2-Red
                                t : type,
                                sounds : [0,0], // tracks if its played the fall and hit ground sound
                                });
                }
            }//

            function UpdateShots(x){
                if(x == 0){
                   ctx.drawImage(bullet_spritesheet,0,0,4,7,65,415,8,14)
                   ctx.drawImage(bullet_spritesheet,0,0,4,7,85,415,8,14) 
                   ctx.drawImage(bullet_spritesheet,0,0,4,7,105,415,8,14) 
                }else if(x == 1){
                   ctx.drawImage(bullet_spritesheet,0,0,4,7,65,415,8,14)
                   ctx.drawImage(bullet_spritesheet,0,0,4,7,85,415,8,14)
                }else if(x == 2){
                    ctx.drawImage(bullet_spritesheet,0,0,4,7,65,415,8,14)
                }
            }

            function CheckIfWon(){

                let aliveducks = 0;
                let goneducks = 0;
                if(round_ended == false){
                    for (let duck of ducks) {

                        let offscreen =
                            duck.y < -40 ||
                            duck.x + duck_scale <= 0 ||
                            duck.x > canvas.width;

                        if (offscreen && duck.s != 2) {
                            goneducks++;
                        }
                        else if (duck.s != 2) {
                            aliveducks++;
                        }
                    }
                    if(goneducks == diffuculty){ //Both Fly off Screen
                        EndRound()
                        round_ended = true;
                        won_round = false;
                        
                        for (let i = diffuculty; i > diffuculty - aliveducks - goneducks; i--){
                            shot_duck_counter[Object.keys(shot_duck_counter).length+1] = 0;
                        }
                    }else if(aliveducks == 0 && goneducks > 0){ //Lose, no alive ducks left and more than 1 off screen
                        EndRound()
                        round_ended = true;
                        won_round = false;
                        
                        for (let i = diffuculty; i > diffuculty - aliveducks - goneducks; i--){
                            shot_duck_counter[Object.keys(shot_duck_counter).length+1] = 0;
                        }
                    }else if(aliveducks == 0 && goneducks == 0){ //Win, both are shot
                        EndRound()
                        round_ended = true;
                        won_round = true;
                        
                        for (let i = diffuculty; i > diffuculty - aliveducks - goneducks; i--){
                            shot_duck_counter[Object.keys(shot_duck_counter).length+1] = 0;
                        }
                    }else if(shots == maxshots && (aliveducks > 0 || goneducks > 0)){//Ran out of shots lose
                        EndRound()
                        round_ended = true;
                        won_round = false;
                        

                        for (let i = diffuculty; i > diffuculty - aliveducks - goneducks; i--){
                            shot_duck_counter[Object.keys(shot_duck_counter).length+1] = 0;
                        }
                    }
                }
            }

            function EndRound(){
                setTimeout(() => {
                    gamestate = 2;
                    setTimeout(() => {
                        ResetRound();
                    }, 2000);
                }, 2000);
            }
            
            function EndLevel(){
                setTimeout(() => {//Wait for Ducks to fall
                    end_of_level = true;
                    gamestate = 3;
                    setTimeout(() => {//Wait for ducks to tally
                        if (shot_duck_collapse.length >= num_to_shoot){//play sound if win or lose
                            PlaySound('clear_round')
                        }else{
                            PlaySound('you_failed')
                        }

                        setTimeout(() => { //wait for end of round song to play
                            if (shot_duck_collapse.length == 10){
                                PlaySound('perfect_round')
                                points += 1000;
                                round_sign_time = 0;
                                dog_sniff_anim = false;
                                dog_sniff.bark_ft = .2;
                                dog_sniff.bark_count = 0;
                                dog_sniff.x = 80;
                                dog_sniff.y = dog_sniff.starty;
                                dog_sniff.s = 0;
                                dog_sniff.f = 0;
                                dog_sniff.ac = 0;
                                gamestate = 5;
                                perfect_level = true;
                                setTimeout(() => { //wait for perfect sign
                                    gamestate = 4; 
                                    setTimeout(() => { //wait for dog to sniff
                                        ResetLevel();
                                        ResetRound();
                                    }, 5000);
                                }, 2000);
                            }else if (shot_duck_collapse.length >= num_to_shoot){//Win Level
                                round_sign_time = 0;
                                dog_sniff_anim = false;
                                dog_sniff.bark_ft = .2;
                                dog_sniff.bark_count = 0;
                                dog_sniff.x = 80;
                                dog_sniff.y = dog_sniff.starty;
                                dog_sniff.s = 0;
                                dog_sniff.f = 0;
                                dog_sniff.ac = 0;
                                gamestate = 4; 
                                setTimeout(() => { //wait for dog to sniff
                                    ResetLevel();
                                    ResetRound();
                                }, 5000);
                            }else{//Lose Level and reset
                                dog_sniff_anim = false;
                                dog_sniff.bark_ft = .2;
                                dog_sniff.bark_count = 0;
                                dog_sniff.x = 80;
                                dog_sniff.y = dog_sniff.starty;
                                dog_sniff.s = 0;
                                dog_sniff.f = 0;
                                dog_sniff.ac = 0;
                                dog.pt = 0;
                                dog.y = 300;
                                dog.d = 1;
                                won_round = false;
                                gameover = true;
                                gamestate = 5;

                                setTimeout(() => { //wait for dog to laugh
                                    gamestate = 0;
                                    if (points > high_score){
                                        high_score = points;
                                    }
                                    points = 0;
                                    level_num = 0;
                                    round_num = 0;
                                    round_sign_time = 0;
                                }, 4000);
                            }
                        }, (shot_duck_collapse.length >= num_to_shoot) ? 4000 : 2000);
                    }, 2000);
                }, 1);
            }

            function WeightedRandom(values,weights){
                let r = Math.random();
                let sum = 0;

                for (let i = 0; i < values.length; i++) {
                    sum += weights[i];
                    if (r < sum) return values[i];
                }
            }

            function update(currentTime){

                dt = (currentTime - lasttime) / 1000; 
                lasttime = currentTime;

                ctx.clearRect(0, 0, canvas.width, canvas.height)
                switch (gamestate) {
                    case 0: //Main Menu
                        MainMenu();
                        DrawScore(high_score, 370, 395);
                        break;
                    case 1: //Duck Hunting
                        RoundClock();
                        DrawBackground();
                        UpdateDucks();
                        DrawForeGround();
                        DrawPoints();
                        UpdateShots(shots);
                        DrawScore(points, 481, 415);
                        DrawRoundNum(level_num,100,384);
                        DrawTallyMarks(num_to_shoot, 240, 435);
                        DrawDuckCounter(shot_duck_counter,240, 417);
                        CheckIfWon();

                        break;
                    case 2: // End of Round
                        DrawBackground();
                        DrawDog(ducks.length, .8);
                        DrawForeGround();
                        UpdateShots(shots);
                        DrawScore(points, 481, 415);
                        DrawRoundNum(level_num,100,384);
                        DrawTallyMarks(num_to_shoot, 240, 435);
                        DrawDuckCounter(shot_duck_counter,240, 417);
                        break;
                    case 3: // End of Level
                        DrawBackground();
                        DrawForeGround();
                        DrawDuckCounterCollapse(shot_duck_counter,240, 417);
                        UpdateShots(shots);
                        DrawScore(points, 481, 415);
                        DrawRoundNum(level_num,100,384);
                        DrawTallyMarks(num_to_shoot, 240, 435);
                        break;
                    case 4: //Dog Sniffing Animation with Level Sign
                        DrawBackground();
                        DrawForeGround();
                        DrawDogSniff(dog_sniff_anim);
                        UpdateShots(shots);
                        DrawScore(points, 481, 415);
                        DrawRoundNum(level_num+1,100,384);
                        DrawTallyMarks(num_to_shoot+1, 240, 435);
                        break;
                    case 5: //Game Over/Perfect Round
                        DrawBackground();
                        DrawDog(1,6);
                        DrawForeGround();
                        DrawDuckCounterCollapse(shot_duck_counter,240, 417);
                        UpdateShots(shots);
                        DrawScore(points, 481, 415);
                        DrawRoundNum(level_num+1,100,384);
                        DrawTallyMarks(num_to_shoot+1, 240, 435);
                        break;
                }       
                DrawCursor()
                if (show_gun_flash == true){
                    ctx.drawImage(gunflash_spritesheet,0,0,256,224,0,0,canvas.width,canvas.height)
                    show_gun_flash = false;
                }
                
                requestAnimationFrame(update);
            }

        </script>
