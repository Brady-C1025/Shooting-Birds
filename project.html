<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Shooting Birds</title>
        <meta charset="utf-8"> 
        <style>
            .gamecanvas{
                 border:1px solid white;
                 padding: 0; 
                 margin: auto; 
                 display: block;
                 cursor: none;
            }
            .centeredtext{
                display: flex;
                align-items: center;
                justify-content: center;
                color: white;
            }
            body{
                background-color: black;
            }
        </style>
    </head>
    <body>
        
        <h1 class="centeredtext" >Shooting Birds</h1>
        <h2 class="centeredtext" >Designed By Brady Crago</h2>

        <canvas class="gamecanvas" id="GameCanvas" width="640" height="480"></canvas>
        
        <img id="blackduck_spritesheet" src="img/blackduck.png" style="display: none;">
        <img id="mainmenu_spritesheet" src="img/MainMenu.png" style="display: none;">
        <img id="cursor_spritesheet" src="img/cursor.png" style="display: none;">
        <img id="LevelBackground_spritesheet" src="img/LevelBackground.png" style="display: none;">
        <img id="LevelForeground_spritesheet" src="img/LevelForeground.png" style="display: none;">
        <img id="bullet_spritesheet" src="img/bullet.png" style="display: none;">
        <img id="dogwin_spritesheet" src="img/dogwin.png" style="display: none;">
        <img id="flyaway_spritesheet" src="img/FlyAway.png" style="display: none;">


        <script>

            var canvas = document.getElementById("GameCanvas");
            var ctx = canvas.getContext("2d");
            ctx.imageSmoothingEnabled = false;
            
            let gamestate = 0;
            let round_num = 0;
            let round_ended = false;
            let won_round = false;

            const duck_scale = 64;
            const duck_change_direction_interval = 200;
            const duck_animation_speed = 15;
            const blackduck_spritesheet = document.getElementById("blackduck_spritesheet");
            let ducks = []

            const mainmenu_spritesheet = document.getElementById("mainmenu_spritesheet");

            const levelbackground_spritesheet = document.getElementById("LevelBackground_spritesheet");
            const levelforeground_spritesheet = document.getElementById("LevelForeground_spritesheet");
            
            const bullet_spritesheet = document.getElementById("bullet_spritesheet");
            const flyaway_spritesheet = document.getElementById("flyaway_spritesheet");
            
            const dogwin_spritesheet = document.getElementById("dogwin_spritesheet");
            let dog = {x : 280, y : 300, d : 1, v : 1, ymin : 200, ymax : 300,pt : 0 , ft : 0 , f : 0, fr : 30}

            const cursor_scale = 64;
            const cursor_spritesheet = document.getElementById("cursor_spritesheet");
            let mouseX = 0;
            let mouseY = 0;
            let clickX = 0;
            let clickY = 0;
            let maxshots = 3;
            let shots = 0;
            canvas.addEventListener("mousemove", function (e) {
                const rect = canvas.getBoundingClientRect();
                mouseX = e.clientX - rect.left;
                mouseY = e.clientY - rect.top;
            });
            canvas.addEventListener("click", function (e) {
                const rect = canvas.getBoundingClientRect();
                clickX = e.clientX - rect.left;
                clickY = e.clientY - rect.top;
                Click(clickX, clickY);
            });


            if (mainmenu_spritesheet.complete) {
                update();
            } else {
                mainmenu_spritesheet.onload = update;
            }

            function UpdateDucks(){
                for (let duck of ducks){

                    if(duck.s != 2){// check if not dead
                        
                        if(round_ended == false){
                            if(duck.x <= 0){ //turn around if at edge of canvas
                                duck.d[0] = 0;
                            }else if(duck.x + duck_scale >= canvas.width){
                                duck.d[0]= Math.PI;
                            }else if(duck.y + duck_scale >= canvas.height-100){
                                duck.d[0]= 3 * Math.PI / 2;
                            }

                            duck.d = GetDuckDirection(duck.d); //update duck location
                            duck.x += Math.cos(duck.d[0]) * duck.v;
                            duck.y += Math.sin(duck.d[0]) * duck.v;
                        }else{
                            if(duck.s != 2){
                                duck.y -= 2;
                                duck.s = 3;
                            }
                            
                        }
                    }
                    if(duck.s == 2 && duck.f != 0){ //when dead fall down
                        duck.y += 1;
                    }

                    duck.s = GetDuckState(duck.s,duck.d) //update duck state

                    if (duck.s == 2 && duck.ft < duck_animation_speed+50){
                        duck.ft += 1;
                    }else{
                        if(duck.ft >= duck_animation_speed){ //update duck animation
                            duck.ft = 0;
                            duck.f = GetDuckFrame(duck.s, duck.f);
                        }else{
                            duck.ft += 1;
                        }
                    }

                    var flipx = false
                    if(Math.cos(duck.d[0]) < 0){ //flips the duck depending on direction moving
                        flipx = true;
                    }else{
                        flipx = false;
                    }

                    DrawDuck( // draw the duck
                        blackduck_spritesheet,
                        ((duck.f*40)+(duck.s*120)),0,
                        40,40,
                        duck.x, duck.y,
                        duck_scale,duck_scale,
                        flipx
                    );
                }
            }

            function GetDuckState(state,direction){ //sets the state of the duck, state used for sprite determination
                if(state == 2){
                    return 2;
                }else if(state == 3){
                    return 3;
                }else if(Math.abs(Math.cos(direction[0])) > Math.abs(Math.sin(direction[0]))){ //checks if its mainly moving horizontal
                    return 1;
                }else{
                    return 0;
                }
            }

            function GetDuckDirection(direction){ //sets a random direction
                if(direction[1] > duck_change_direction_interval){
                    angle = Math.random() * Math.PI * 2;
                    return [angle, 0]
                }else{
                    return [direction[0],direction[1]+=1]
                }
            }

            function DrawDuck(img, sx, sy, sw, sh, dx, dy, dw, dh, flipX){ //original drawImage function but with the option to flip horizontally
            
                ctx.save();
            
                if(flipX){
                    ctx.translate(dx + dw, dy);
                    ctx.scale(-1,1);
                    ctx.drawImage(img, sx, sy, sw, sh, 0, 0, dw, dh);
                } else {
                    ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
                }
            
                ctx.restore();

            }

            function GetDuckFrame(state, frame){ //returns the sprite frame for the duck
                if(state == 0){
                    if(frame == 2){
                        return 0;
                    }else{
                        return frame + 1;
                    }
                }else if(state == 1){
                    if(frame == 2){
                        return 0;
                    }else{
                        return frame + 1;
                    }
                }else if(state == 2){
                    if(frame == 2){
                        return 1;
                    }else{
                        return frame + 1;
                    }
                }else if(state == 3){
                    if(frame == 2){
                        return 0;
                    }else{
                        return frame + 1;
                    }
                }
            }

            function MainMenu(){
                ctx.drawImage(mainmenu_spritesheet,0,0,256,224,0,0,canvas.width, canvas.height)
            }

            function DrawCursor(){
                ctx.drawImage(cursor_spritesheet,0,0,32,32,mouseX-(cursor_scale/2),mouseY-(cursor_scale/2),cursor_scale,cursor_scale)
            }

            function DrawBackground(){
                ctx.drawImage(levelbackground_spritesheet,0,0,256,240,0,0,canvas.width, canvas.height)
            }

            function DrawForeGround(){
                ctx.drawImage(levelforeground_spritesheet,0,0,256,240,0,0,canvas.width, canvas.height)
            }

            function DrawDog(num_of_ducks){
                
                if(dog.d == 1){// dog up
                    dog.y -= dog.v;
                    if(dog.y < dog.ymin){
                        dog.d = 0;
                    }
                }
                if(dog.d == 2){// dog down
                    if(dog.y < dog.ymax){
                        dog.y += dog.v;
                        dog.d = 0;
                    }
                }
                if(dog.d == 0){// dog pause
                    dog.pt += 1
                    if(dog.pt > 100){
                        dog.d = 2;
                    }
                }
                if(dog.ft >= dog.fr){
                    dog.ft = 0;
                    if(dog.f == 1){
                        dog.f = 0;
                    }else{
                        dog.f = 1;
                    }
                }else{
                    dog.ft += 1;
                }

                if(won_round == true){
                    ctx.drawImage(dogwin_spritesheet,(num_of_ducks-1)*60,0,60,60,dog.x,dog.y,120,120)
                }else{
                    ctx.drawImage(dogwin_spritesheet,180+(60*dog.f),0,60,60,dog.x,dog.y,120,120)
                    ctx.drawImage(flyaway_spritesheet,0,0,192,64,224,100,192,40)
                }
            }

            function ResetRound(){
                round_ended = false;
                ducks = [];
                GenerateDucks(2,1)
                shots = 0;
                dog.pt = 0
                dog.y = 300
                dog.d = 1
                round_num += 1
                gamestate = 1;
            }

            function Click(x,y){
                if(gamestate == 0){
                    ResetRound()
                }else if(gamestate == 1 && shots < maxshots && round_ended == false){
                    shots += 1;
                    for (let duck of ducks){
                        if((x > duck.x && x < (duck.x + duck_scale)) && (y > duck.y && y < (duck.y + duck_scale)) && duck.s != 2){
                            duck.s = 2;
                            duck.f = 0;
                        }
                    }
                }
            }
            
            function GenerateDucks(n,v){
                for (let i = 0; i < n; i++) {
                    ducks.push({x : Math.floor(Math.random() * 640) + 1, y : 380, //x/y pos. of duck
                                v : v, //velocity/speed
                                s : 0, f : 0, ft : 0, //s is state, f is frame, ft is frametick
                                d : [3 * Math.PI / 2,120] //d is direction and time since last change)
                                });
                }
            }

            function UpdateShots(x){
                if(x == 0){
                   ctx.drawImage(bullet_spritesheet,0,0,4,7,65,415,8,14)
                   ctx.drawImage(bullet_spritesheet,0,0,4,7,85,415,8,14) 
                   ctx.drawImage(bullet_spritesheet,0,0,4,7,105,415,8,14) 
                }else if(x == 1){
                   ctx.drawImage(bullet_spritesheet,0,0,4,7,65,415,8,14)
                   ctx.drawImage(bullet_spritesheet,0,0,4,7,85,415,8,14)
                }else if(x == 2){
                    ctx.drawImage(bullet_spritesheet,0,0,4,7,65,415,8,14)
                }
            }

            function CheckIfWon(){

                aliveducks = 0;
                goneducks = 0;
                if(round_ended == false){
                    for (let duck of ducks){
                        if(duck.s != 2 && duck.y > -80){
                            aliveducks += 1;
                        }
                        if(duck.y < -80){
                            goneducks += 1;
                        }
                    }

                    if(aliveducks == 0 && goneducks == 0){
                        EndRound()
                        round_ended = true;
                        won_round = true;
                    }

                    if(aliveducks == 0 && goneducks > 0){
                        EndRound()
                        round_ended = true;
                        won_round = false;
                    }

                    if(shots == maxshots && (aliveducks > 0 || goneducks > 0)){
                        EndRound()
                        round_ended = true;
                        won_round = false;
                    }
                }
            }

            function EndRound(){
                setTimeout(() => {
                    gamestate = 2;
                    setTimeout(() => {
                        ResetRound();
                    }, 2000);
                }, 3000);
            }
            
            function update(){

                ctx.clearRect(0, 0, canvas.width, canvas.height)
                switch (gamestate) {
                    case 0:
                        MainMenu();
                        break;
                    case 1:
                        DrawBackground();
                        UpdateDucks();
                        DrawForeGround();
                        UpdateShots(shots);
                        CheckIfWon();
                        break;
                    case 2:
                        DrawBackground();
                        DrawDog(1);
                        DrawForeGround();
                        UpdateShots(shots);
                        break;
                }       
                DrawCursor()
                requestAnimationFrame(update);
            }

        </script>
    </body>
</html>
